extends:
  - promptocop:recommended

rules:
  no-vague-verb: error
  no-ambiguous-pronoun: error
  missing-success-criteria: error
  no-file-context: warn
  no-constraints: warn
  multi-task: error
  context-dump-risk: warn
  prefer-example: info

# Uncomment to block prompts with errors when used as a Claude Code hook:
# strict: true

# Uncomment to disable conversation-aware classification (confirmations and follow-ups):
# conversationAware: false

# Uncomment to add project-specific vague verbs:
# options:
#   no-vague-verb:
#     additionalVerbs:
#       - "touch"
#       - "revisit"
